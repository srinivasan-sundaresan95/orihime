name: Orihime Index
description: Index a repository branch into an Orihime code knowledge graph instance.
branding:
  icon: git-branch
  color: purple

inputs:
  write_url:
    description: URL of the Orihime write server (e.g. http://your-server:7701)
    required: true
  repo_name:
    description: Logical name to give this repo in the graph (default: github.repository)
    required: false
    default: ${{ github.repository }}
  branch:
    description: Branch name to index (default: current branch)
    required: false
    default: ${{ github.head_ref || github.ref_name }}
  force:
    description: Force full re-index even if files are unchanged
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Index branch into Orihime
      shell: bash
      run: |
        RESPONSE=$(curl -s -w "\n%{http_code}" --retry 3 --retry-delay 5 \
          -X POST "${{ inputs.write_url }}/reindex" \
          -H "Content-Type: application/json" \
          -d "{\"repo_path\": \"$GITHUB_WORKSPACE\", \"repo_name\": \"${{ inputs.repo_name }}\", \"branch\": \"${{ inputs.branch }}\", \"force\": ${{ inputs.force }}}")
        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | head -n -1)
        echo "Response: $BODY"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "Error: write server returned HTTP $HTTP_CODE"
          exit 1
        fi
        OK=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok',''))")
        if [ "$OK" != "True" ]; then
          ERROR=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error','unknown'))")
          echo "Error: index_repo failed: $ERROR"
          exit 1
        fi
        echo "Indexed branch ${{ inputs.branch }} successfully."
        echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); s=d.get('summary',{}); [print(f'  {k}: {v}') for k,v in s.items()]"
