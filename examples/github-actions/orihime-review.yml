name: orihime-review

on:
  workflow_run:
    workflows: ["orihime-index"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print comments without posting (dry run)"
        type: boolean
        default: false

jobs:
  review:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve PR number and branch
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_DATA=$(gh pr list --state open --base master --json number,headRefName --limit 1)
            PR_NUMBER=$(echo "$PR_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['number']) if d else print('')")
            BRANCH=$(echo "$PR_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['headRefName']) if d else print('')")
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
            PR_DATA=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
              --jq '.pull_requests[0] | {number: .number, branch: .head.ref}')
            PR_NUMBER=$(echo "$PR_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('number',''))")
            BRANCH=$(echo "$PR_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('branch',''))")
          fi
          if [ -z "$PR_NUMBER" ] || [ -z "$BRANCH" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: srinivasan-sundaresan95/orihime/actions/review@v1
        if: steps.pr-info.outputs.skip == 'false'
        with:
          sse_url: ${{ secrets.ORIHIME_SSE_URL }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ steps.pr-info.outputs.pr_number }}
          branch: ${{ steps.pr-info.outputs.branch }}
          dry_run: ${{ inputs.dry_run || 'false' }}
