name: orihime-cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete PR branch index from Orihime
        env:
          ORIHIME_WRITE_URL: ${{ secrets.ORIHIME_WRITE_URL }}
        run: |
          echo "Deleting Orihime index for branch ${{ github.head_ref }}"
          RESPONSE=$(curl --silent --show-error \
            --retry 3 --retry-delay 5 \
            --write-out "\n%{http_code}" \
            -X POST "${ORIHIME_WRITE_URL}/write" \
            -H "Content-Type: application/json" \
            -d '{
              "statements": [
                {
                  "cypher": "MATCH (f:File {branch_name: $branch})-[*0..]->(n) DETACH DELETE n",
                  "params": {"branch": "${{ github.head_ref }}"}
                }
              ]
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response body: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: /write returned HTTP $HTTP_CODE — index may not have been cleaned up"
          else
            ROWS=$(echo "$BODY" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('rows_affected', 'unknown'))" 2>/dev/null || echo "unknown")
            echo "Deleted $ROWS node(s) for branch ${{ github.head_ref }}"
          fi
